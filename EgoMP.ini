; EgoMP configuration. This file must sit next to EgoMP.dll.
; Server operators: preconfigure server_ip/server_port before distributing.

[client]
; Dedicated server (or P2P host) to connect to.
server_ip=127.0.0.1
server_port=60000
; 1: connect automatically after loading into the world, retrying every 10
;    seconds while unconnected. 0: connect manually with NUMPAD2.
; Set to 0 if you intend to host a P2P session yourself (NUMPAD1).
auto_connect=1

[host]
; Port used when hosting a peer-to-peer session with NUMPAD1.
port=60000

[display]
; 1: force the game to run in a window. Recommended when running two clients on
;    one machine so they don't fight over the exclusive fullscreen display.
;    0: leave the game fullscreen.
windowed=1
; 1: give that window a title bar, sized to fit the screen, so you can move it
;    yourself. 0: leave the game's own borderless window.
reshape=1
; Client size in pixels for reshape=1. 0 = the game's own resolution, shrunk to
; fit the screen. The future launcher writes these to size each client.
window_width=0
window_height=0
; Make the windows manageable with the mouse despite Fable's mouse grab:
; HOLD ALT to release the grab -- the arrow appears over the game; steer it
; onto the title bar to drag, an edge to resize, or another client to switch.
; Release Alt over the game (or click back into it) to grab again. While
; playing (Alt up) the mouse is grabbed exactly like retail: the in-game
; cursor/camera behave normally and clicks can't leave the window.
; Omitted or -1: on whenever reshape is on. 0: never. 1: always.
mouse_unlock=-1
; 1 (default): the Alt-toggled retail grab described above. 0: instead make
; the mouse permanently shared -- dragging then works without holding Alt,
; but the Windows cursor roams invisibly during play and a click landing
; outside the window steals the game's focus.
mouse_lock=1

[storage]
; 1: give EACH client on this machine its own save/data folders, so the clients
;    don't collide on Documents\My Games\Fable (shared tattoo files) or on
;    %APPDATA%\Microsoft\Fable (comfront.dat, held open with no sharing by a
;    playing client -- either collision crashes the second client on world
;    load). Each launch gets the next free number: the first running client
;    uses Client1, the second Client2, and so on (closing a client frees its
;    number for reuse). 0: all clients share the normal locations.
separate_saves=1
; Base folder that holds the per-client folders; client N lives at
; <data_root>\Client<N>\My Games\Fable. Leave blank for the default
; %LOCALAPPDATA%\EgoMP.
data_root=
; 1: seed a brand-new client folder from a template so it isn't empty (existing
;    client folders are never touched). 0: new clients start empty.
seed_new_clients=1
; The "My Games\Fable" folder to copy into a new client. Blank = the default
; <data_root>\Template\My Games\Fable. Put the heroes you want every new client
; to start with there.
seed_from=

[general]
; 1: show the EgoMP log console (starts minimized). 0: hide it.
console=1
; 1: enable reverse-engineering debug keys (NUMPAD5: dump the local hero's
;    component map to the console and EgoMP-inspect.log). Developers only.
debug_keys=1
; 1 (default): crash diagnostics. Logs every C++ exception the game throws
;    (type name + stack), the most recent file opens, and writes a one-shot
;    minidump, all to EgoMP-crash-<pid>.log/.dmp next to EgoMP.dll. Passive --
;    it never changes game behaviour. 0: off.
crash_diag=1
