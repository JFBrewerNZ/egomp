; EgoMP configuration. This file must sit next to EgoMP.dll.
; Server operators: preconfigure server_ip/server_port before distributing.

[client]
; Dedicated server (or P2P host) to connect to.
server_ip=127.0.0.1
server_port=60000
; 1: connect automatically after loading into the world, retrying every 10
;    seconds while unconnected. 0: connect manually with NUMPAD2.
; Set to 0 if you intend to host a P2P session yourself (NUMPAD1).
auto_connect=1

[host]
; Port used when hosting a peer-to-peer session with NUMPAD1.
port=60000

[display]
; 1: force the game to run in a window. Recommended when running two clients on
;    one machine so they don't fight over the exclusive fullscreen display.
;    0: leave the game fullscreen.
windowed=1
; 1: give that window a title bar, sized to fit the screen, so you can move it
;    yourself. 0: leave the game's own borderless window.
reshape=1
; Client size in pixels for reshape=1. 0 = the game's own resolution, shrunk to
; fit the screen. The future launcher writes these to size each client.
window_width=0
window_height=0
; Let Windows handle the window frame again (drag the title bar, edge resize)
; by acquiring Fable's mouse in shared instead of exclusive mode. The in-game
; cursor is unaffected. While the game window is focused the Windows cursor is
; locked inside it (so clicks can't land outside and steal focus); HOLD ALT to
; release the lock -- the arrow appears, steer it onto the title bar to drag,
; or onto another client to switch. Omitted or -1: on whenever reshape is on.
; 0: never. 1: always (even with reshape=0).
mouse_unlock=-1

[storage]
; 1: give EACH client on this machine its own save/data folder, so the clients
;    don't collide on Documents\My Games\Fable (a shared hero's tattoo files
;    otherwise crash the second client on world load). Each launch gets the next
;    free number: the first running client uses Client1, the second Client2, and
;    so on (closing a client frees its number for reuse). 0: all clients share
;    the normal Documents location.
separate_saves=1
; Base folder that holds the per-client folders; client N lives at
; <data_root>\Client<N>\My Games\Fable. Leave blank for the default
; %LOCALAPPDATA%\EgoMP.
data_root=
; 1: seed a brand-new client folder from a template so it isn't empty (existing
;    client folders are never touched). 0: new clients start empty.
seed_new_clients=1
; The "My Games\Fable" folder to copy into a new client. Blank = the default
; <data_root>\Template\My Games\Fable. Put the heroes you want every new client
; to start with there.
seed_from=

[general]
; 1: show the EgoMP log console (starts minimized). 0: hide it.
console=1
; 1: enable reverse-engineering debug keys (NUMPAD5: dump the local hero's
;    component map to the console and EgoMP-inspect.log). Developers only.
debug_keys=1
